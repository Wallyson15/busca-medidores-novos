<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Medidor</title>
    <style>
        /* Estilos básicos para deixar a interface limpa e moderna */
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f0f2f5; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%;
            max-width: 400px;
        }
        input { 
            padding: 12px; 
            font-size: 16px; 
            width: 90%; 
            margin-bottom: 15px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            text-align: center;
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        #mensagem { margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <h2>📍 Localizador de Medidores</h2>
        <p>Digite os dígitos finais do medidor:</p>
        <input type="text" id="inputMedidor" placeholder="Ex: 12345" autocomplete="off">
        <button onclick="buscarMedidor()">Buscar no Mapa</button>
        <div id="mensagem"></div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO DO SUPABASE
        // ==========================================
        // ATENÇÃO: Substitua os valores abaixo pelas chaves do seu projeto Supabase!
        const supabaseUrl = 'https://hprrnzotddltordqwjui.supabase.co'; 
        const supabaseKey = 'sb_publishable_TFNoKnIrbxRdhalZSosXrA__4xfHKl3';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ==========================================
        // 2. LÓGICA DE BUSCA
        // ==========================================
        async function buscarMedidor() {
            const input = document.getElementById('inputMedidor').value.trim();
            const divMensagem = document.getElementById('mensagem');

            // Verifica se o usuário digitou algo
            if (!input) {
                divMensagem.innerHTML = "<span style='color: red;'>Por favor, digite o número do medidor.</span>";
                return;
            }

            divMensagem.innerHTML = "<span style='color: #007bff;'>Buscando no banco de dados... ⏳</span>";

            try {
                // Faz a consulta no Supabase
                // .like garante que ele procure qualquer medidor que TERMINE com os números digitados
                const { data, error } = await supabase
                    .from('medidores') // Atenção: Este deve ser o nome exato da tabela que você criar lá
                    .select('lat, lng')
                    .like('numero', `%${input}`)
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    divMensagem.innerHTML = "<span style='color: green;'>Medidor encontrado! Abrindo mapa... ✅</span>";
                    
                    // Pega as coordenadas e garante que usem ponto (correção preventiva)
                    let lat = String(data[0].latitude).replace(',', '.');
                    let lng = String(data[0].longitude).replace(',', '.');

                    // Monta o link do Google Maps e abre em uma nova aba
                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
                    window.open(mapsUrl, '_blank');
                    
                    // Limpa o campo para a próxima busca
                    document.getElementById('inputMedidor').value = '';
                } else {
                    divMensagem.innerHTML = "<span style='color: orange;'>Nenhum medidor encontrado com esses dígitos finais. ❌</span>";
                }
            } catch (err) {
                console.error("Erro na busca:", err);
                divMensagem.innerHTML = "<span style='color: red;'>Erro ao conectar com o banco de dados. Verifique suas chaves.</span>";
            }
        }
        
        // ==========================================
        // 3. EXTRA: BUSCAR COM A TECLA "ENTER"
        // ==========================================
        document.getElementById('inputMedidor').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                buscarMedidor();
            }
        });
    </script>

</body>
</html>
