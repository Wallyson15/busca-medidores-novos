<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Medidores</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%;
            max-width: 400px;
        }
        input { 
            padding: 12px; 
            font-size: 16px; 
            width: 90%; 
            margin-bottom: 15px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            text-align: center;
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        
        #mensagem { margin-top: 15px; font-size: 14px; font-weight: bold; }
        
        /* Novos estilos para a lista de resultados */
        #listaResultados {
            margin-top: 20px;
            text-align: left;
        }
        .item-medidor {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-mapa {
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-mapa:hover { background-color: #218838; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <h2>📍 Localizador de Medidores</h2>
        <p>Digite os dígitos finais do medidor:</p>
        <input type="text" id="inputMedidor" placeholder="Ex: 45072" autocomplete="off">
        <button onclick="buscarMedidor()">Buscar</button>
        
        <div id="mensagem"></div>
        <div id="listaResultados"></div> 
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO DO SUPABASE
        // ==========================================
        const supabaseUrl = 'https://hprrnzotddltordqwjui.supabase.co'; 
        const supabaseKey = 'sb_publishable_TFNoKnIrbxRdhalZSosXrA__4xfHKl3';
        const clienteSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ==========================================
        // 2. LÓGICA DE BUSCA
        // ==========================================
        async function buscarMedidor() {
            const input = document.getElementById('inputMedidor').value.trim();
            const divMensagem = document.getElementById('mensagem');
            const divResultados = document.getElementById('listaResultados');

            // Limpa resultados anteriores
            divResultados.innerHTML = '';

            if (!input) {
                divMensagem.innerHTML = "<span style='color: red;'>Por favor, digite o número do medidor.</span>";
                return;
            }

            divMensagem.innerHTML = "<span style='color: #007bff;'>Buscando no banco de dados... ⏳</span>";

            try {
                // Removemos o .limit(1) para trazer todos os resultados
                // Adicionamos 'numero' no .select() para sabermos qual é qual
                const { data, error } = await clienteSupabase
                    .from('medidores') 
                    .select('numero, lat, lng')
                    .like('numero', `%${input}`); 

                if (error) throw error;

                if (data && data.length > 0) {
                    divMensagem.innerHTML = `<span style='color: green;'>Encontramos ${data.length} medidor(es)! ✅</span>`;
                    
                    // Monta a lista de resultados
                    let htmlLista = '';
                    
                    data.forEach(medidor => {
                        let lat = String(medidor.lat).replace(',', '.');
                        let lng = String(medidor.lng).replace(',', '.');

                        // Link oficial e mais confiável para abrir pinos no Google Maps
                        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
                        
                        // Cria a "caixinha" de cada medidor
                        htmlLista += `
                            <div class="item-medidor">
                                <div>
                                    <strong>Medidor:</strong> <br>
                                    <span style="font-size: 18px;">${medidor.numero}</span>
                                </div>
                                <a href="${mapsUrl}" target="_blank" class="btn-mapa">📍 Mapa</a>
                            </div>
                        `;
                    });

                    // Coloca a lista gerada na tela
                    divResultados.innerHTML = htmlLista;
                    document.getElementById('inputMedidor').value = ''; // Limpa o campo
                    
                } else {
                    divMensagem.innerHTML = "<span style='color: orange;'>Nenhum medidor encontrado com esses dígitos finais. ❌</span>";
                }
            } catch (err) {
                console.error("Erro na busca:", err);
                divMensagem.innerHTML = "<span style='color: red;'>Erro ao conectar com o banco de dados.</span>";
            }
        }
        
        // ==========================================
        // 3. EXTRA: BUSCAR COM A TECLA "ENTER"
        // ==========================================
        document.getElementById('inputMedidor').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                buscarMedidor();
            }
        });
    </script>

</body>
</html>
